<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coachella & Glamour Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #080810;
      --surface:  #0f0f1e;
      --card:     #141428;
      --border:   #1e1e3a;
      --accent:   #f9c74f;
      --accent2:  #c084fc;
      --accent3:  #90e0ef;
      --red:      #ef233c;
      --green:    #06d6a0;
      --text:     #e8e8f0;
      --muted:    #7070a0;
      --mono:     'Space Mono', monospace;
      --sans:     'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(249,199,79,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249,199,79,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 60px; }

    /* ── Header ── */
    header {
      padding: 48px 0 36px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
    }
    .header-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .title-block h1 {
      font-family: var(--mono);
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
      color: #fff;
    }
    .title-block h1 span { color: var(--accent); }
    .subtitle {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: 0.5px;
    }

    .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .badge {
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 700;
      letter-spacing: 0.5px;
      border: 1px solid;
    }
    .badge-gold   { color: var(--accent);  border-color: var(--accent);  background: rgba(249,199,79,0.08); }
    .badge-purple { color: var(--accent2); border-color: var(--accent2); background: rgba(192,132,252,0.08); }
    .badge-teal   { color: var(--accent3); border-color: var(--accent3); background: rgba(144,224,239,0.08); }
    .badge-red    { color: var(--red);     border-color: var(--red);     background: rgba(239,35,60,0.08); }
    .badge-green  { color: var(--green);   border-color: var(--green);   background: rgba(6,214,160,0.08); }

    .run-date {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      white-space: nowrap;
    }

    /* ── KPI bar ── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .kpi {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      transition: border-color .2s;
    }
    .kpi:hover { border-color: var(--accent); }
    .kpi-label { font-size: 11px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .kpi-value { font-size: 24px; font-family: var(--mono); font-weight: 700; color: #fff; }
    .kpi-value.up   { color: var(--green); }
    .kpi-value.down { color: var(--red); }
    .kpi-value.gold { color: var(--accent); }
    .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Section label ── */
    .section-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      padding-left: 2px;
    }

    /* ── Two column grid ── */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
    @media (max-width: 680px) { .grid2 { grid-template-columns: 1fr; } }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 24px;
    }
    .card-title {
      font-family: var(--mono);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 18px;
    }

    /* ── Allocation table ── */
    .alloc-table { width: 100%; border-collapse: collapse; }
    .alloc-table th {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .alloc-table td {
      padding: 10px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    .alloc-table tr:last-child td { border-bottom: none; }
    .ticker-pill {
      display: inline-block;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(249,199,79,0.12);
      color: var(--accent);
      margin-right: 6px;
    }
    .weight-bar-wrap { display: flex; align-items: center; gap: 10px; }
    .weight-bar-bg {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      overflow: hidden;
    }
    .weight-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .6s ease;
    }
    .weight-pct {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      min-width: 44px;
      text-align: right;
    }
    .sector-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 4px;
    }

    /* ── Comparison table ── */
    .compare-table { width: 100%; border-collapse: collapse; }
    .compare-table th {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .compare-table td {
      padding: 10px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .compare-table tr:last-child td { border-bottom: none; }
    .highlight { color: var(--accent); font-family: var(--mono); font-weight: 700; }
    .dim       { color: var(--muted); font-family: var(--mono); }

    /* ── Charts full width ── */
    .chart-full {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .chart-full img {
      width: 100%;
      display: block;
    }
    .chart-caption {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      padding: 10px 16px;
      border-top: 1px solid var(--border);
    }

    /* ── VIX / signals card ── */
    .vix-bar {
      height: 8px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--green) 0%, var(--accent) 50%, var(--red) 100%);
      margin: 10px 0 4px;
      position: relative;
    }
    .vix-needle {
      position: absolute;
      top: -4px;
      width: 4px; height: 16px;
      border-radius: 2px;
      background: #fff;
      transform: translateX(-50%);
      box-shadow: 0 0 6px rgba(255,255,255,0.6);
    }
    .vix-labels {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .signal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
    .signal-chip {
      padding: 5px 8px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      text-align: center;
      border: 1px solid;
    }
    .sig-bull { background: rgba(6,214,160,0.1);  color: var(--green); border-color: rgba(6,214,160,0.3); }
    .sig-bear { background: rgba(239,35,60,0.1);   color: var(--red);   border-color: rgba(239,35,60,0.3); }
    .sig-neut { background: rgba(112,112,160,0.1); color: var(--muted); border-color: rgba(112,112,160,0.3); }

    /* ── Constraint info box ── */
    .constraint-box {
      background: rgba(249,199,79,0.05);
      border: 1px solid rgba(249,199,79,0.2);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 28px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
    }
    .constraint-box strong { color: var(--accent); font-family: var(--mono); }

    /* ── Footer ── */
    footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* ── Loading state ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      gap: 12px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Fade in ── */
    .fade-in { animation: fadeIn .5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="header-top">
      <div class="title-block">
        <h1>🎶 <span>Coachella &amp; Glamour</span><br>Portfolio Optimizer</h1>
        <div class="subtitle">OPIM 5641 · Modern Portfolio Theory · UConn</div>
        <div class="badge-row">
          <span class="badge badge-gold">MPT + Binary Constraints</span>
          <span class="badge badge-purple">25 Stocks → 10 Selected</span>
          <span class="badge badge-teal">5 Sectors</span>
          <span class="badge badge-gold">60-Day Sliding Window</span>
        </div>
      </div>
      <div id="run-date" class="run-date">Loading…</div>
    </div>
  </header>

  <div id="main-content">
    <div class="loading"><div class="spinner"></div> Loading latest results…</div>
  </div>

</div>

<script>
const SECTOR_COLORS = {
  Fashion:    "#C084FC",
  Beauty:     "#F472B6",
  Music:      "#FB923C",
  Healthcare: "#34D399",
  Tech:       "#60A5FA",
};

function fmt(v, type) {
  if (type === "pct")  return (v * 100).toFixed(2) + "%";
  if (type === "dollar") return "$" + v.toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2});
  if (type === "num")  return (+v).toFixed(3);
  return v;
}

async function load() {
  let data;
  try {
    const r = await fetch("results/latest.json?t=" + Date.now());
    data = await r.json();
  } catch(e) {
    document.getElementById("main-content").innerHTML =
      `<div class="loading" style="color:#ef233c">⚠️ Could not load results/latest.json — run the optimizer first.</div>`;
    return;
  }

  document.getElementById("run-date").textContent = "📅 " + data.run_date;

  const alloc    = data.allocation || {};
  const spy      = data.spy || {};
  const paper    = data.paper_trading || {};
  const gc       = data.golden_cross || {};
  const vix      = data.vix || 0;
  const fearMode = data.mode === "min_variance";
  const portVal  = paper.portfolio_value || 10000;
  const spyVal   = paper.spy_value       || 10000;
  const portRet  = ((portVal / 10000) - 1);
  const spyRet   = ((spyVal  / 10000) - 1);

  // Mode badge
  const modeBadge = fearMode
    ? `<span class="badge badge-red">⚠️ MIN-VARIANCE MODE (VIX ${vix.toFixed(1)} &gt; 28)</span>`
    : `<span class="badge badge-green">🚀 MAX-SHARPE MODE (VIX ${vix.toFixed(1)})</span>`;

  // Sorted holdings
  const holdings = Object.entries(alloc)
    .sort((a, b) => b[1].weight - a[1].weight);

  // KPIs
  const kpiHtml = `
  <div class="kpi-row fade-in">
    <div class="kpi">
      <div class="kpi-label">Ann. Return</div>
      <div class="kpi-value ${data.ann_return > 0 ? 'up' : 'down'}">${fmt(data.ann_return, "pct")}</div>
      <div class="kpi-sub">vs SPY ${fmt(spy.annualized_ret || 0, "pct")}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Sharpe Ratio</div>
      <div class="kpi-value gold">${fmt(data.sharpe, "num")}</div>
      <div class="kpi-sub">vs SPY ${fmt(spy.sharpe || 0, "num")}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Ann. Risk</div>
      <div class="kpi-value">${fmt(data.ann_risk, "pct")}</div>
      <div class="kpi-sub">portfolio std dev</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Paper Portfolio</div>
      <div class="kpi-value ${portVal >= 10000 ? 'up' : 'down'}">${fmt(portVal, "dollar")}</div>
      <div class="kpi-sub">started at $10,000</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">vs Buy &amp; Hold</div>
      <div class="kpi-value ${portRet >= spyRet ? 'up' : 'down'}">${portRet >= spyRet ? '▲' : '▼'} ${Math.abs((portRet - spyRet) * 100).toFixed(2)}pp</div>
      <div class="kpi-sub">our model vs S&P 500</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">VIX Level</div>
      <div class="kpi-value ${vix > 28 ? 'down' : vix > 20 ? 'gold' : 'up'}">${vix.toFixed(1)}</div>
      <div class="kpi-sub">${fearMode ? "⚠️ High fear" : "✅ Calm market"}</div>
    </div>
  </div>`;

  // Constraint info
  const constraintHtml = `
  <div class="constraint-box fade-in">
    <strong>MODEL CONSTRAINTS (Prof. Wanik requirements):</strong><br>
    Binary <strong>Y<sub>i</sub> ∈ {0,1}</strong> selects stocks &nbsp;|&nbsp;
    Continuous <strong>X<sub>i</sub></strong> sets weight &nbsp;|&nbsp;
    Linking: <strong>5% · Y<sub>i</sub> ≤ X<sub>i</sub> ≤ 40% · Y<sub>i</sub></strong> &nbsp;|&nbsp;
    <strong>∑ Y<sub>i</sub> = ${data.n_stocks_selected}</strong> stocks chosen from pool of <strong>${data.n_stocks_pool}</strong> &nbsp;|&nbsp;
    <strong>∑ X<sub>i</sub> = 1</strong> (sum-to-one) &nbsp;|&nbsp;
    Mode: ${modeBadge}
  </div>`;

  // Allocation table
  const maxW = Math.max(...holdings.map(([,v]) => v.weight));
  const allocRows = holdings.map(([nm, info]) => {
    const color = SECTOR_COLORS[info.sector] || "#888";
    const barW  = (info.weight / maxW * 100).toFixed(1);
    return `
    <tr>
      <td><span class="ticker-pill">${info.ticker}</span>${nm}</td>
      <td><span class="sector-dot" style="background:${color}"></span>${info.sector}</td>
      <td>
        <div class="weight-bar-wrap">
          <div class="weight-bar-bg">
            <div class="weight-bar-fill" style="width:${barW}%;background:${color}"></div>
          </div>
          <span class="weight-pct">${fmt(info.weight, "pct")}</span>
        </div>
      </td>
    </tr>`;
  }).join("");

  // Comparison table
  const compareHtml = `
  <table class="compare-table">
    <thead><tr><th>Metric</th><th>Our Portfolio</th><th>S&amp;P 500 (SPY)</th></tr></thead>
    <tbody>
      <tr><td>Ann. Return</td><td class="highlight">${fmt(data.ann_return,"pct")}</td><td class="dim">${fmt(spy.annualized_ret||0,"pct")}</td></tr>
      <tr><td>Ann. Risk</td><td class="highlight">${fmt(data.ann_risk,"pct")}</td><td class="dim">${fmt(spy.annualized_vol||0,"pct")}</td></tr>
      <tr><td>Sharpe Ratio</td><td class="highlight">${fmt(data.sharpe,"num")}</td><td class="dim">${fmt(spy.sharpe||0,"num")}</td></tr>
      <tr><td>Max Drawdown</td><td class="highlight">—</td><td class="dim">${fmt(spy.max_drawdown||0,"pct")}</td></tr>
      <tr><td>Paper Value</td><td class="highlight">${fmt(portVal,"dollar")}</td><td class="dim">${fmt(spyVal,"dollar")}</td></tr>
      <tr><td>Total Return</td><td class="highlight">${fmt(portRet,"pct")}</td><td class="dim">${fmt(spyRet,"pct")}</td></tr>
    </tbody>
  </table>`;

  // VIX bar
  const vixPct = Math.min(Math.max((vix / 50) * 100, 0), 100);
  const vixHtml = `
    <div style="margin-bottom:6px;font-size:12px;color:var(--muted)">Current VIX: <strong style="color:#fff">${vix.toFixed(1)}</strong> &nbsp; Threshold: <strong style="color:var(--accent)">28</strong></div>
    <div class="vix-bar"><div class="vix-needle" style="left:${vixPct}%"></div></div>
    <div class="vix-labels"><span>0</span><span>Calm</span><span>28 ←threshold</span><span>50+</span></div>`;

  // Golden cross chips
  const gcHtml = Object.entries(gc).slice(0, 20).map(([tkr, sig]) => {
    const cls = sig === "bullish" ? "sig-bull" : sig === "bearish" ? "sig-bear" : "sig-neut";
    const icon = sig === "bullish" ? "▲" : sig === "bearish" ? "▼" : "●";
    return `<div class="signal-chip ${cls}">${icon} ${tkr}</div>`;
  }).join("");

  // Assemble page
  document.getElementById("main-content").innerHTML = `
    ${kpiHtml}
    ${constraintHtml}

    <div class="section-label">Optimal Allocation &amp; Comparison</div>
    <div class="grid2">
      <div class="card fade-in">
        <div class="card-title">Selected Holdings (Y=1)</div>
        <table class="alloc-table">
          <thead><tr><th>Stock</th><th>Sector</th><th>Weight</th></tr></thead>
          <tbody>${allocRows}</tbody>
        </table>
      </div>
      <div class="card fade-in">
        <div class="card-title">Performance vs S&amp;P 500</div>
        ${compareHtml}
      </div>
    </div>

    <div class="section-label">Charts</div>
    <div class="chart-full fade-in">
      <img src="results/paper_trading.png?t=${Date.now()}" alt="Paper Trading vs SPY">
      <div class="chart-caption">Paper Trading — $10,000 simulated portfolio (yellow) vs S&P 500 buy-and-hold (teal dashed)</div>
    </div>
    <div class="grid2">
      <div class="chart-full fade-in" style="margin-bottom:0">
        <img src="results/efficient_frontier.png?t=${Date.now()}" alt="Efficient Frontier">
        <div class="chart-caption">Efficient frontier — coloured by Sharpe ratio. ★ = selected optimal point.</div>
      </div>
      <div class="chart-full fade-in" style="margin-bottom:0">
        <img src="results/allocation_pie.png?t=${Date.now()}" alt="Allocation">
        <div class="chart-caption">Today's allocation across sectors.</div>
      </div>
    </div>
    <div class="chart-full fade-in" style="margin-top:16px">
      <img src="results/weight_history.png?t=${Date.now()}" alt="Weight History">
      <div class="chart-caption">Daily allocation shifts — how weights evolve as the 60-day window slides forward.</div>
    </div>

    <div class="section-label" style="margin-top:28px">Market Signals</div>
    <div class="grid2">
      <div class="card fade-in">
        <div class="card-title">VIX Fear Index</div>
        ${vixHtml}
        <div style="font-size:12px;color:var(--muted);line-height:1.6">
          When VIX > 28, the model automatically switches from <em>max-Sharpe</em> to <em>minimum-variance</em> mode — reducing risk during high-fear periods.
        </div>
      </div>
      <div class="card fade-in">
        <div class="card-title">Golden Cross Signals (10d vs 30d MA)</div>
        <div class="signal-grid">${gcHtml}</div>
        <div style="margin-top:12px;font-size:11px;color:var(--muted)">▲ Bullish (10d > 30d) &nbsp; ▼ Bearish &nbsp; ● Neutral</div>
      </div>
    </div>

    <footer>
      <span>OPIM 5641 · Business Decision Modeling · UConn</span>
      <span>Auto-generated by GitHub Actions · ${data.run_date}</span>
      <span>Window: ${data.window_days}d &nbsp;|&nbsp; Pool: ${data.n_stocks_pool} → ${data.n_stocks_selected} stocks</span>
    </footer>
  `;
}

load();
</script>
</body>
</html>
