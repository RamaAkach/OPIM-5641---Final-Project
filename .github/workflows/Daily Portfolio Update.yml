name: Daily Portfolio Update

on:
  schedule:
    - cron: '55 20 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Requirements.txt

      - name: Run Portfolio Optimizer
        run: python optimizer.py
      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      - name: Render Quarto dashboard
        run: quarto render portfolio_dashboard.qmd
      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add results/
          git commit -m "Daily update: $(date '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"

          git pull --rebase origin main
          git push
