name: Daily Portfolio Update

on:
  schedule:
    - cron: '55 20 * * 1-5'   # 3:55 PM EST (Mon–Fri) — just before market close
  workflow_dispatch:            # Manual trigger button on GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: 
          pip install -r Requirements.txt

      - name: Run Portfolio Optimizer
        run: python optimizer.py

      - name: Commit and push results
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add results/
          git commit -m "🎶 Daily update: $(date '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"

          git pull --rebase origin main
          git push
